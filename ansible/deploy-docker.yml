---
- name: Deploy Recipe Book Docker Container
  hosts: webserver
  become: yes
  vars:
    container_name: recipe-book
    image_name: recipe-book:latest
    host_port: 80
    container_port: 80

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install prerequisites for Docker
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - gnupg
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Update apt cache again
      apt:
        update_cache: yes

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Ensure Docker service is running
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Install Docker SDK for Python
      pip:
        name: docker
        state: present
        executable: pip3

    - name: Create directory for website files
      file:
        path: /opt/recipe-book
        state: directory
        mode: '0755'

    - name: Copy website files to server
      copy:
        src: ../website/
        dest: /opt/recipe-book/
        mode: '0644'

    - name: Create Dockerfile on server
      copy:
        dest: /opt/recipe-book/Dockerfile
        content: |
          FROM nginx:alpine
          COPY . /usr/share/nginx/html
          EXPOSE 80
          CMD ["nginx", "-g", "daemon off;"]
        mode: '0644'

    - name: Build Docker image
      docker_image:
        name: "{{ image_name }}"
        source: build
        build:
          path: /opt/recipe-book
        state: present

    - name: Stop and remove existing container if running
      docker_container:
        name: "{{ container_name }}"
        state: absent
      ignore_errors: yes

    - name: Run Docker container
      docker_container:
        name: "{{ container_name }}"
        image: "{{ image_name }}"
        ports:
          - "{{ host_port }}:{{ container_port }}"
        state: started
        restart_policy: always

    - name: Verify container is running
      shell: docker ps --filter name={{ container_name }} --format "table {{.Names}}\t{{.Status}}"
      register: container_status
      changed_when: false

    - name: Display container status
      debug:
        msg: "{{ container_status.stdout_lines }}"
